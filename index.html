<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerodha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="navbar">
    <img src="https://zerodha.com/static/images/logo.svg" alt="Zerodha Logo" class="header-img">
    <nav class="menu">
        <a href="https://zerodha.com/open-account/" target="_blank">Sign in</a>
        <a href="https://zerodha.com/about/" target="_blank">About</a>
        <a href="https://zerodha.com/product/" target="_blank">Product</a>
        <a href="https://zerodha.com/pricing/" target="_blank">Pricing</a>
        <a href="https://zerodha.com/support/" target="_blank">Support</a>
    </nav>
</div>
<div class="landing-page">
    <center>
        <img src="https://zerodha.com/static/images/landing.svg" alt="Zerodha Landing Image" width="800">
    </center>
</div>
<div>
    <center>
    <h2> Invest in everything</h2>
    <p>Online platform to invest in stocks, derivatives, mutual funds, ETFs, bonds, and more.</p>
</center>
</div>
<div>
<center>
    <button>Sign up For Free</button>
</center>
</div>  
<form>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <br>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>
    <br>
    <label for="Name">Name:</label>
    <input type="text" id="Name" name="Name" required>
    <br>
    <label for="Phone">Phone:</label>
    <input type="text" id="Phone" name="Phone" required>
    <br>
    <label for="address">Address:</label>
    <textarea> </textarea>
    <select name="Gender" id="Gender">
        <option value="Select">Select</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>
    <br>
    <table border="1">
        <tr>
            <th>Company</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Apple</td>
            <td>$150</td>
        </tr>
    </table>
    <button type="submit">Submit</button>
</form>
</body>
</html>
